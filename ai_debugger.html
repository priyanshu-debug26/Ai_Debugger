<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Debugger Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Top Header -->
    <header class="top-header">
        <div class="logo">DEBUG_OS_v1.0</div>
        <div class="nav-links">
            <span>Docs</span>
            <span>API Reference</span>
            <span>Status</span>
        </div>
        <div class="icons">
            <svg class="icon" viewBox="0 0 24 24">
                <path
                    d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
            </svg>
            <svg class="icon" viewBox="0 0 24 24">
                <path
                    d="M12,2C6.48,2,2,6.48,2,12s4.48,10,10,10s10-4.48,10-10S17.52,2,12,2z M13,19h-2v-2h2V19z M15.07,11.25l-0.9,0.92 C13.45,12.9,13,13.5,13,15h-2v-0.5c0-1.1,0.45-2.1,1.17-2.83l1.24-1.26c0.37-0.36,0.59-0.86,0.59-1.41c0-1.1-0.9-2-2-2 s-2,0.9-2,2H8c0-2.21,1.79-4,4-4s4,1.79,4,4C16,9.88,15.54,10.68,15.07,11.25z" />
            </svg>
        </div>
    </header>

    <!-- Main Content -->
    <div class="main-container">

        <!-- Left Panel -->
        <div class="left-panel">
            <div class="panel-header">
                <h1>AI Debugger</h1>
                <div class="status-container">
                    <div class="status-dot"></div>
                    System Status: Ready
                </div>
            </div>

            <div class="input-section">
                <div class="input-label">Error / Source Code</div>
                <textarea id="source-input" placeholder="Paste your code here..."></textarea>
                <div class="button-group">
                    <button id="analyze-btn" class="btn">Analyze</button>
                    <button id="clear-btn" class="btn">Clear</button>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <h1>Debug Chat</h1>

            <div class="chat-container" id="chat-container">
                <!-- Greeting message -->
                <div class="message ai">
                    <div class="ai-header">
                        <svg class="ai-icon" viewBox="0 0 24 24">
                            <path
                                d="M21,11h-1.06c-0.23-1.61-1.03-3.04-2.19-4.14l0.75-0.75c0.39-0.39,0.39-1.02,0-1.41c-0.39-0.39-1.02-0.39-1.41,0l-0.86,0.86 C14.9,5.01,13.5,4.6,12,4.6s-2.9,0.41-4.23,0.96L6.91,4.71c-0.39-0.39-1.02-0.39-1.41,0c-0.39,0.39-0.39,1.02,0,1.41l0.75,0.75 C5.09,7.96,4.29,9.39,4.06,11H3c-1.1,0-2,0.9-2,2v2c0,1.1,0.9,2,2,2h1v1c0,2.21,1.79,4,4,4h8c2.21,0,4-1.79,4-4v-1h1c1.1,0,2-0.9,2-2 v-2C23,11.9,22.1,11,21,11z M10,15H8v-2h2V15z M16,15h-2v-2h2V15z" />
                        </svg>
                        AI Debugger
                    </div>
                    <p>Hello! I'm ready to help you debug your code. Paste your source code or error logs in the left
                        panel, and click <strong>Analyze</strong> to get started.</p>
                </div>
            </div>

            <div id="loading-indicator" class="loading">AI is thinking...</div>

            <div class="chat-input-container">
                <input type="text" id="chat-input" placeholder="Ask a follow-up question...">
                <button id="send-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                    </svg>
                </button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
